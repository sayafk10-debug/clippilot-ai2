<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipPilot AI</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header>
<nav class="navbar">
<div class="logo">🚀 ClipPilot AI</div>
</nav>
</header>

<section class="generator">

<h2>💡 AI Content Generator</h2>

<p>Generate viral ideas, scripts, hooks, captions and hashtags instantly.</p>

<div class="tool-buttons">

<button data-type="ideas" onclick="setToolType('ideas')">
💡 Ideas
</button>

<button data-type="script" onclick="setToolType('script')">
🎬 Script
</button>

<button data-type="hook" onclick="setToolType('hook')">
🔥 Hook
</button>

<button data-type="caption" onclick="setToolType('caption')">
📝 Caption
</button>

<button data-type="hashtags" onclick="setToolType('hashtags')">
# Hashtags
</button>

</div>

<div class="generator-box">

<textarea
id="prompt"
placeholder="Example: Furniture business for Saudi Arabia..."
></textarea>

<button id="generateBtn">
Generate 🚀
</button>

<div id="result"></div>

</div>

<div id="historyPanel">

<h3>📜 History</h3>

<div id="historyList"></div>

</div>

</section>

<script src="js/api.js"></script>
<script src="js/script.js"></script>

</body>
</html>
