<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipPilot AI</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header>
<nav class="navbar">
<div class="logo">🚀 ClipPilot</div>
</nav>
</header>

<section class="generator">

<h2>💡 AI Content Generator</h2>

<p>Generate viral ideas, scripts, hooks, captions instantly.</p>

<div class="tool-buttons">
  <button onclick="setToolType('ideas')">💡 Ideas</button>
  <button onclick="setToolType('script')">🎬 Script</button>
  <button onclick="setToolType('hook')">🔥 Hook</button>
  <button onclick="setToolType('caption')">📝 Caption</button>
  <button onclick="setToolType('hashtags')"># Hashtags</button>
</div>

<div class="generator-box">

<textarea id="prompt" placeholder="Enter your niche..."></textarea>

<button id="generateBtn">Generate 🚀</button>

<div id="result"></div>

</div>

<!-- HISTORY PANEL -->
<div id="historyPanel">
  <h3>📜 History</h3>
  <div id="historyList"></div>
</div>

</section>

<script src="js/api.js"></script>
<script src="js/script.js"></script>

</body>
</html>
